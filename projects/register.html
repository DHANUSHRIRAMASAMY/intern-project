<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Sign up to get started</p>

    <form id="registerForm">
      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Enter your name">
      </div>
      <div class="mb-3">
        <label>Email</label>
        <input type="text" id="email" class="form-control" placeholder="Enter your email"
          style="text-transform:lowercase" oninput="this.value=this.value.toLowerCase()" autocomplete="off">
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Create a password">
      </div>
      <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>

    <p class="footer-text">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/register.js"></script>

</body>
</html>
