<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/profile.css">
</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="profile-card">

          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">My Profile</h3>
            <button type="button" id="editBtn" class="btn btn-outline-primary btn-sm">Edit Profile</button>
          </div>

          <form id="profileForm">
            <div class="row mb-3">
              <div class="col-md-6">
                <label>Name</label>
                <input type="text" id="name" class="form-control" placeholder="Full name" disabled>
              </div>
              <div class="col-md-6">
                <label>Email</label>
                <input type="email" id="email" class="form-control" readonly>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label>Contact</label>
                <input type="text" id="contact" class="form-control" placeholder="Phone number" disabled>
              </div>
              <div class="col-md-6">
                <label>Date of Birth</label>
                <input type="date" id="dob" class="form-control" disabled>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label>Age</label>
                <input type="number" id="age" class="form-control" placeholder="Age" disabled>
              </div>
              <div class="col-md-6">
                <label>Address</label>
                <input type="text" id="address" class="form-control" placeholder="Address" disabled>
              </div>
            </div>

            <div class="mb-4">
              <label>Bio / About</label>
              <textarea id="bio" class="form-control" rows="3" placeholder="Tell something about yourself" disabled></textarea>
            </div>

            <button type="submit" id="saveBtn" class="btn btn-save w-100 d-none">Save Changes</button>
          </form>

          <p id="message" class="mt-3 text-center"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/profile.js"></script>

</body>
</html>
